<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Handwritten Digit Recognition</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>Handwritten Digit Recognition</h1>

        <p class="subtitle">
            Draw a digit between 0 and 9
        </p>

        <canvas
            id="canvas"
            width="280"
            height="280">
        </canvas>

        <div class="button-group">

            <button id="predictBtn">
                Predict
            </button>

            <button id="clearBtn">
                Clear
            </button>

        </div>

        <div class="result-card">

            <h2>
                Prediction
            </h2>

            <p id="prediction">
                -
            </p>

            <h2>
                Confidence
            </h2>

            <p id="confidence">
                -
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
